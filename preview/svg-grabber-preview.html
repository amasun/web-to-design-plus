<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SVG Grabber Panel · 可视化预览</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
<style>
  /* ===== 页面背景（非弹窗本体）===== */
  html, body {
    margin: 0;
    min-height: 100%;
    background:
      radial-gradient(1200px 600px at 20% 10%, #2b2b2b 0%, #161616 60%, #0d0d0d 100%);
    font-family: 'Inter', sans-serif;
  }
  .page-note {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 0;
    color: rgba(255,255,255,.4);
    font-size: 12px;
    user-select: none;
  }

  /*
   * ============================================================
   *  下面 <style id="panel-style"> 块就是 svg-grabber.js 里
   *  getStyleContent() 的内容（:host 已改为 .sg-root 以便在
   *  非 shadow DOM 环境直接生效）。改这里即可实时预览样式。
   * ============================================================
   */
</style>

<style id="panel-style">
  .sg-root { all: initial; }
  .sg-root * { box-sizing: border-box; }

  .sg-root .sg-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 100; /* 降低 z-index，避免遮挡 Trae 的元素审查工具 */
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
  }

  .sg-root .sg-panel {
    --sg-accent: #7ee100;
    width: min(1040px, 92vw);
    height: min(720px, 88vh);
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 16px;
    border: 1px solid rgba(0, 0, 0, 0.08);
    box-shadow: 0px 8px 32px 0px rgba(0, 0, 0, 0.25), 0px 0px 1px 0px rgba(255, 255, 255, 0.4) inset;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    color: #1a1a1a;
    transition: background-color 0.2s ease, color 0.2s ease;
  }
  .sg-root .sg-panel.sg-theme-dark {
    --sg-accent: #D4FC5D;
    background: rgba(30, 30, 30, 0.96);
    border-color: rgba(255, 255, 255, 0.08);
    box-shadow: 0px 8px 32px 0px rgba(0, 0, 0, 0.45), 0px 0px 1px 0px rgba(255, 255, 255, 0.15) inset;
    color: rgba(255, 255, 255, 0.9);
  }

  .sg-root .sg-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    flex-shrink: 0;
  }
  .sg-root .sg-theme-dark .sg-header { border-bottom-color: rgba(255, 255, 255, 0.08); }

  .sg-root .sg-title { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; }
  .sg-root .sg-title svg { width: 24px; height: 24px; display: block; flex-shrink: 0; color: var(--sg-accent); }

  .sg-root .sg-close-btn {
    border: none;
    background: rgba(0, 0, 0, 0.06);
    color: rgba(0, 0, 0, 0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    cursor: pointer;
    transition: background-color 0.2s ease, color 0.2s ease, transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    flex-shrink: 0;
  }
  .sg-root .sg-close-btn:hover { background: rgba(0, 0, 0, 0.12); transform: rotate(90deg); }
  .sg-root .sg-theme-dark .sg-close-btn { background: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.9); }
  .sg-root .sg-theme-dark .sg-close-btn:hover { background: rgba(255, 255, 255, 0.2); }

  .sg-root .sg-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .sg-root .sg-theme-dark .sg-controls { border-bottom-color: rgba(255, 255, 255, 0.08); }

  .sg-root .sg-search {
    flex: 1 1 160px;
    min-width: 120px;
    background: rgba(0, 0, 0, 0.04);
    border: 1px solid rgba(0, 0, 0, 0.12);
    border-radius: 6px;
    color: #1a1a1a;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    padding: 6px 10px;
    outline: none;
  }
  .sg-root .sg-search::placeholder { color: rgba(0, 0, 0, 0.4); }
  .sg-root .sg-search:focus { border-color: var(--sg-accent); }
  .sg-root .sg-theme-dark .sg-search { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.12); color: rgba(255, 255, 255, 0.9); }
  .sg-root .sg-theme-dark .sg-search::placeholder { color: rgba(255, 255, 255, 0.4); }

  .sg-root .sg-control-btn {
    background: rgba(0, 0, 0, 0.04);
    border: 1px solid rgba(0, 0, 0, 0.12);
    border-radius: 6px;
    color: #1a1a1a;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    padding: 6px 10px;
    cursor: pointer;
    white-space: nowrap;
  }
  .sg-root .sg-control-btn:hover { background: rgba(0, 0, 0, 0.08); }
  .sg-root .sg-control-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .sg-root .sg-theme-dark .sg-control-btn { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.12); color: rgba(255, 255, 255, 0.9); }
  .sg-root .sg-theme-dark .sg-control-btn:hover { background: rgba(255, 255, 255, 0.15); }

  .sg-root .sg-bg-toggle { display: flex; border: 1px solid rgba(0, 0, 0, 0.12); border-radius: 6px; overflow: hidden; background: rgba(0, 0, 0, 0.02); }
  .sg-root .sg-bg-toggle button {
    background: transparent;
    border: none;
    color: rgba(0, 0, 0, 0.45);
    padding: 6px 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    transition: all 0.2s ease;
  }
  .sg-root .sg-bg-toggle button svg { width: 14px; height: 14px; display: block; }
  .sg-root .sg-bg-toggle button.active { background: rgba(0, 0, 0, 0.08); color: rgba(0, 0, 0, 0.9); }
  .sg-root .sg-theme-dark .sg-bg-toggle { border-color: rgba(255, 255, 255, 0.12); background: rgba(255, 255, 255, 0.02); }
  .sg-root .sg-theme-dark .sg-bg-toggle button { color: rgba(255, 255, 255, 0.45); }
  .sg-root .sg-theme-dark .sg-bg-toggle button.active { background: rgba(255, 255, 255, 0.15); color: #ffffff; }

  .sg-root .sg-status { padding: 8px 16px 0; font-size: 12px; color: rgba(0, 0, 0, 0.55); min-height: 18px; flex-shrink: 0; }
  .sg-root .sg-theme-dark .sg-status { color: rgba(255, 255, 255, 0.6); }

  .sg-root .sg-grid {
    flex: 1;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    padding: 16px;
    align-content: start;
    scrollbar-width: thin;
    scrollbar-color: rgba(0, 0, 0, 0.2) transparent;
  }
  .sg-root .sg-grid::-webkit-scrollbar { width: 8px; }
  .sg-root .sg-grid::-webkit-scrollbar-track { background: transparent; }
  .sg-root .sg-grid::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.2); border-radius: 4px; }
  .sg-root .sg-grid::-webkit-scrollbar-thumb:hover { background: rgba(0, 0, 0, 0.35); }
  .sg-root .sg-theme-dark .sg-grid { scrollbar-color: rgba(255, 255, 255, 0.25) transparent; }
  .sg-root .sg-theme-dark .sg-grid::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.25); }
  .sg-root .sg-theme-dark .sg-grid::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

  .sg-root .sg-empty { grid-column: 1 / -1; text-align: center; padding: 40px 0; color: rgba(0, 0, 0, 0.45); font-size: 13px; }
  .sg-root .sg-theme-dark .sg-empty { color: rgba(255, 255, 255, 0.5); }

  .sg-root .sg-card {
    background: #ffffff;
    border: 1px solid rgba(0, 0, 0, 0.08);
    color: #1a1a1a;
    border-radius: 10px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .sg-root .sg-theme-dark .sg-card { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.08); color: rgba(255, 255, 255, 0.9); }

  .sg-root .sg-preview-box {
    position: relative;
    width: 100%;
    height: 80px;
    border-radius: 6px;
    background: rgba(237, 237, 237, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: background-color 0.2s ease;
  }
  .sg-root .sg-theme-dark .sg-preview-box { background: #1c1c1c; }
  .sg-root .sg-preview-box:not(.sg-preview-box-fallback) { cursor: pointer; }
  .sg-root .sg-preview-box:not(.sg-preview-box-fallback):hover { box-shadow: 0 0 0 2px var(--sg-accent) inset; }

  .sg-root .sg-svg-preview { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
  .sg-root .sg-svg-preview svg { max-width: 100%; max-height: 100%; width: auto; height: auto; }

  .sg-root .sg-fallback-img { max-width: 36px; max-height: 36px; }

  .sg-root .sg-card-checkbox {
    position: absolute;
    top: 4px;
    left: 4px;
    z-index: 1;
    display: flex;
    cursor: pointer;
  }
  .sg-root .sg-card-checkbox input { width: 15px; height: 15px; margin: 0; cursor: pointer; }

  .sg-root .sg-card-label {
    width: 100%;
    font-size: 11px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0.85;
  }

  .sg-root .sg-card-actions { display: flex; align-items: center; justify-content: center; gap: 6px; }

  .sg-root .sg-action-btn {
    border: none;
    background: rgba(0, 0, 0, 0.06);
    color: rgba(0, 0, 0, 0.65);
    width: 30px;
    height: 30px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    text-decoration: none;
    transition: background-color 0.2s ease, color 0.2s ease;
  }
  .sg-root .sg-theme-dark .sg-action-btn { background: rgba(255, 255, 255, 0.08); color: rgba(255, 255, 255, 0.8); }
  .sg-root .sg-action-btn:hover { background: var(--sg-accent); color: #000000; }
  .sg-root .sg-action-btn-success { background: var(--sg-accent) !important; color: #000000 !important; }
  .sg-root .sg-action-btn svg { width: 16px; height: 16px; display: block; }

  .sg-root .sg-footer { padding: 8px 16px; border-top: 1px solid rgba(0, 0, 0, 0.08); font-size: 11px; color: rgba(0, 0, 0, 0.5); flex-shrink: 0; }
  .sg-root .sg-theme-dark .sg-footer { border-top-color: rgba(255, 255, 255, 0.08); color: rgba(255, 255, 255, 0.5); }
</style>
</head>
<body>
  <div class="page-note">SVG Grabber · 预览页面（直接修改 <code>#panel-style</code> 即可看到样式变化）</div>

  <!-- 把弹窗挂在 .sg-root 下，等价于 Shadow DOM 根 -->
  <div class="sg-root">
    <div class="sg-backdrop">
      <div class="sg-panel" role="dialog" aria-label="Grab SVG icons">
        <div class="sg-header">
          <div class="sg-title">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10.2887 9.00525C9.1505 9.19475 8.10931 9.76218 7.33312 10.616C6.55693 11.4698 6.09101 12.5602 6.01052 13.7113M13.7113 9.00525C14.8495 9.19475 15.8907 9.76218 16.6669 10.616C17.4431 11.4698 17.909 12.5602 17.9895 13.7113M10.2887 8.57743H5.15488M5.15488 8.57743C5.15488 8.80436 5.06474 9.02199 4.90427 9.18246C4.74381 9.34292 4.52617 9.43307 4.29924 9.43307C4.07231 9.43307 3.85468 9.34292 3.69421 9.18246C3.53375 9.02199 3.4436 8.80436 3.4436 8.57743C3.4436 8.3505 3.53375 8.13286 3.69421 7.9724C3.85468 7.81194 4.07231 7.72179 4.29924 7.72179C4.52617 7.72179 4.74381 7.81194 4.90427 7.9724C5.06474 8.13286 5.15488 8.3505 5.15488 8.57743ZM18.8451 8.57743H13.7113M18.8451 8.57743C18.8451 8.80436 18.9353 9.02199 19.0957 9.18246C19.2562 9.34292 19.4738 9.43307 19.7008 9.43307C19.9277 9.43307 20.1453 9.34292 20.3058 9.18246C20.4662 9.02199 20.5564 8.80436 20.5564 8.57743C20.5564 8.3505 20.4662 8.13286 20.3058 7.9724C20.1453 7.81194 19.9277 7.72179 19.7008 7.72179C19.4738 7.72179 19.2562 7.81194 19.0957 7.9724C18.9353 8.13286 18.8451 8.3505 18.8451 8.57743ZM4.29924 14.5669C4.29924 14.34 4.38939 14.1223 4.54985 13.9619C4.71032 13.8014 4.92795 13.7113 5.15488 13.7113H6.86616C7.09309 13.7113 7.31073 13.8014 7.47119 13.9619C7.63165 14.1223 7.7218 14.34 7.7218 14.5669V16.2782C7.7218 16.5051 7.63165 16.7228 7.47119 16.8832C7.31073 17.0437 7.09309 17.1338 6.86616 17.1338H5.15488C4.92795 17.1338 4.71032 17.0437 4.54985 16.8832C4.38939 16.7228 4.29924 16.5051 4.29924 16.2782V14.5669ZM16.2782 14.5669C16.2782 14.34 16.3683 14.1223 16.5288 13.9619C16.6893 13.8014 16.9069 13.7113 17.1338 13.7113H18.8451C19.072 13.7113 19.2897 13.8014 19.4501 13.9619C19.6106 14.1223 19.7008 14.34 19.7008 14.5669V16.2782C19.7008 16.5051 19.6106 16.7228 19.4501 16.8832C19.2897 17.0437 19.072 17.1338 18.8451 17.1338H17.1338C16.9069 17.1338 16.6893 17.0437 16.5288 16.8832C16.3683 16.7228 16.2782 16.5051 16.2782 16.2782V14.5669ZM10.2887 7.72179C10.2887 7.49486 10.3789 7.27722 10.5393 7.11676C10.6998 6.9563 10.9174 6.86615 11.1444 6.86615H12.8556C13.0826 6.86615 13.3002 6.9563 13.4607 7.11676C13.6211 7.27722 13.7113 7.49486 13.7113 7.72179V9.43307C13.7113 9.66 13.6211 9.87763 13.4607 10.0381C13.3002 10.1986 13.0826 10.2887 12.8556 10.2887H11.1444C10.9174 10.2887 10.6998 10.1986 10.5393 10.0381C10.3789 9.87763 10.2887 9.66 10.2887 9.43307V7.72179Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>Grab SVG</span>
          </div>
          <button class="sg-close-btn" id="sgClose" type="button" title="Close">
            <svg width="14" height="14" viewBox="0 0 8 8" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 1L7 7M7 1L1 7" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <div class="sg-controls">
          <input class="sg-search" id="sgSearch" type="text" placeholder="Filter icons…" title="Filter by name" />
          <button class="sg-control-btn" id="sgSort" type="button" title="Sort alphabetically">A–Z</button>
          <div class="sg-bg-toggle" id="sgBgToggle">
            <button data-bg="light" class="active" type="button" title="Light preview">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
            </button>
            <button data-bg="dark" type="button" title="Dark preview">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
            </button>
          </div>
          <button class="sg-control-btn" id="sgSelectAll" type="button" title="Select or deselect all icons">Select All</button>
          <button class="sg-control-btn" id="sgBatchDownload" type="button" title="Download selected icons as a .zip" disabled>Download ZIP (0)</button>
        </div>
        <div class="sg-status" id="sgStatus"></div>
        <div class="sg-grid" id="sgGrid"></div>
        <div class="sg-footer"><span id="sgCount"></span></div>
      </div>
    </div>
  </div>

<script>
  // ====== 与 svg-grabber.js 完全一致的图标常量 ======
  const ICON_COPY = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="9" y="9" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M5 15V6a2 2 0 0 1 2-2h9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>`;
  const ICON_DOWNLOAD = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 4v11m0 0-4-4m4 4 4-4M5 19h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const ICON_CHECK = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 12.5 9.5 17 19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const ICON_ERROR = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  // ====== 注入示例图标（覆盖多种来源/形态）======
  const SAMPLE_ICONS = [
    { label: "arrow-left",    markup: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>' },
    { label: "arrow-right",   markup: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>' },
    { label: "check-circle",  markup: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>' },
    { label: "heart",         markup: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' },
    { label: "star",          markup: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>' },
    { label: "search",        markup: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>' },
    { label: "settings",      markup: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>' },
    { label: "bell",          markup: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>' },
    { label: "mail",          markup: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>' },
    { label: "user",          markup: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>' },
    { label: "lock",          markup: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>' },
    { label: "trash",         markup: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>' },
    { label: "download",      markup: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>' },
    { label: "github",        markup: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>' },
    { label: "play",          markup: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3" fill="currentColor"/></svg>' },
    { label: "pause",         markup: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>' },
    { label: "menu",          markup: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>' },
    { label: "x-close",       markup: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>' },
    { label: "chevron-down",  markup: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>' },
    { label: "plus",          markup: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5v14"/></svg>' },
  ];

  // ====== 复刻 svg-grabber.js 的渲染/交互逻辑 ======
  const root = document.querySelector('.sg-root');
  const panel = root.querySelector('.sg-panel');
  const grid = root.querySelector('#sgGrid');
  const countEl = root.querySelector('#sgCount');
  const searchInput = root.querySelector('#sgSearch');
  const sortBtn = root.querySelector('#sgSort');
  const bgButtons = root.querySelectorAll('#sgBgToggle button');
  const selectAllBtn = root.querySelector('#sgSelectAll');
  const batchBtn = root.querySelector('#sgBatchDownload');

  let filterText = "";
  let sortAsc = true;
  const selectedIds = new Set();

  function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
  function escapeAttr(s){return escapeHtml(s);}

  function cardHtml(item, idx) {
    const id = 'h' + idx;
    const checked = selectedIds.has(id) ? 'checked' : '';
    return `
      <div class="sg-card">
        <div class="sg-preview-box" title="Click to copy">
          <label class="sg-card-checkbox" title="Select"><input type="checkbox" data-select-id="${escapeAttr(id)}" ${checked} /></label>
          <div class="sg-svg-preview">${item.markup}</div>
        </div>
        <div class="sg-card-label" title="${escapeAttr(item.label)}">${escapeHtml(item.label)}</div>
        <div class="sg-card-actions">
          <button class="sg-action-btn" data-action="copy" data-icon-id="${escapeAttr(id)}" title="Copy SVG code">${ICON_COPY}</button>
          <button class="sg-action-btn" data-action="download" data-icon-id="${escapeAttr(id)}" title="Download as .svg">${ICON_DOWNLOAD}</button>
        </div>
      </div>`;
  }

  function getFiltered() {
    let items = SAMPLE_ICONS.map((m, i) => ({ ...m, id: 'h' + i }));
    if (filterText) {
      const q = filterText.toLowerCase();
      items = items.filter(it => it.label.toLowerCase().includes(q));
    }
    items.sort((a, b) => sortAsc ? a.label.localeCompare(b.label) : b.label.localeCompare(a.label));
    return items;
  }

  function flashButton(btn, iconSvg) {
    const original = btn.innerHTML;
    btn.innerHTML = iconSvg;
    btn.classList.add('sg-action-btn-success');
    setTimeout(() => { btn.innerHTML = original; btn.classList.remove('sg-action-btn-success'); }, 1200);
  }

  function updateSelectionUI(items) {
    const allSelected = items.length > 0 && items.every(it => selectedIds.has(it.id));
    selectAllBtn.textContent = allSelected ? 'Deselect All' : 'Select All';
    selectAllBtn.disabled = items.length === 0;
    batchBtn.textContent = `Download ZIP (${selectedIds.size})`;
    batchBtn.disabled = selectedIds.size === 0;
  }

  function render() {
    const items = getFiltered();
    grid.innerHTML = items.map((it, i) => cardHtml(it, parseInt(it.id.slice(1)))).join('');
    countEl.textContent = `${items.length} icon${items.length === 1 ? '' : 's'} found`;
    wireCardActions(items);
    updateSelectionUI(items);
  }

  function wireCardActions(items) {
    grid.querySelectorAll('.sg-action-btn[data-action="copy"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.getAttribute('data-icon-id').slice(1));
        try { navigator.clipboard.writeText(SAMPLE_ICONS[idx].markup); flashButton(btn, ICON_CHECK); }
        catch (e) { flashButton(btn, ICON_ERROR); }
      });
    });
    grid.querySelectorAll('.sg-action-btn[data-action="download"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.getAttribute('data-icon-id').slice(1));
        flashButton(btn, ICON_CHECK);
      });
    });
    grid.querySelectorAll('[data-select-id]').forEach(cb => {
      cb.addEventListener('change', () => {
        const id = cb.getAttribute('data-select-id');
        if (cb.checked) selectedIds.add(id); else selectedIds.delete(id);
        updateSelectionUI(getFiltered());
      });
    });
    grid.querySelectorAll('.sg-preview-box:not(.sg-preview-box-fallback)').forEach(box => {
      box.addEventListener('click', (e) => {
        if (e.target.closest('.sg-card-checkbox')) return;
        const copyBtn = box.parentElement.querySelector('.sg-action-btn[data-action="copy"]');
        if (copyBtn) copyBtn.click();
      });
    });
  }

  searchInput.addEventListener('input', () => { filterText = searchInput.value.trim(); render(); });
  sortBtn.addEventListener('click', () => {
    sortAsc = !sortAsc;
    sortBtn.textContent = sortAsc ? 'A–Z' : 'Z–A';
    render();
  });
  bgButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      bgButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      panel.classList.toggle('sg-theme-dark', btn.dataset.bg === 'dark');
    });
  });
  selectAllBtn.addEventListener('click', () => {
    const items = getFiltered();
    const allSelected = items.length > 0 && items.every(it => selectedIds.has(it.id));
    items.forEach(it => allSelected ? selectedIds.delete(it.id) : selectedIds.add(it.id));
    render();
  });
  batchBtn.addEventListener('click', () => { /* 预览不真实下载 */ });

  render();
</script>
</body>
