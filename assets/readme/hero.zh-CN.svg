<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="100%" height="100%">
  <!-- Background -->
  <rect width="1200" height="480" rx="16" fill="#09090b" />
  
  <!-- Subtle Grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.5" fill="#27272a" />
  </pattern>
  <rect width="1200" height="480" rx="16" fill="url(#grid)" />
  
  <!-- Subtle Glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
    <stop offset="100%" stop-color="#0284c7" stop-opacity="0" />
  </radialGradient>
  <rect width="1200" height="480" fill="url(#glow)" />

  <!-- Left Content: Text -->
  <g transform="translate(80, 190)">
    <!-- Brand Tag -->
    <rect x="0" y="-45" width="86" height="28" rx="6" fill="#0ea5e9" fill-opacity="0.1" stroke="#0ea5e9" stroke-opacity="0.2" />
    <text x="43" y="-26" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#38bdf8" letter-spacing="0.5">FIGMA API</text>
    
    <text x="0" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#f8fafc" letter-spacing="-1.5">Web to Design Plus</text>
    
    <text x="0" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#a1a1aa" letter-spacing="1">瞬间抓取任意网页，一键粘贴为 Figma 矢量图层。</text>
    <text x="0" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#a1a1aa" letter-spacing="1">完美还原 DOM 结构，100% 矢量可编辑，无需配置。</text>
    
    <!-- Action badges -->
    <g transform="translate(0, 140)">
      <rect x="0" y="0" width="160" height="40" rx="20" fill="#27272a" stroke="#3f3f46" stroke-width="1" />
      <text x="80" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#e4e4e7">Ctrl + V 极速还原</text>
      
      <rect x="175" y="0" width="160" height="40" rx="20" fill="#27272a" stroke="#3f3f46" stroke-width="1" />
      <text x="255" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#e4e4e7">SVG 深度穿透提取</text>
    </g>
  </g>

  <!-- Right Content: The Bridge Motif -->
  <g transform="translate(680, 80)">
    
    <!-- Web/Browser Panel -->
    <g transform="translate(0, 0)">
      <rect width="200" height="320" rx="12" fill="#18181b" stroke="#27272a" stroke-width="2" />
      
      <!-- Browser dots -->
      <circle cx="20" cy="20" r="4" fill="#3f3f46" />
      <circle cx="34" cy="20" r="4" fill="#3f3f46" />
      <circle cx="48" cy="20" r="4" fill="#3f3f46" />
      
      <line x1="0" y1="40" x2="200" y2="40" stroke="#27272a" stroke-width="2" />

      <!-- HTML Code -->
      <text x="20" y="80" font-family="monospace" font-size="13" fill="#38bdf8">&lt;div</text>
      <text x="56" y="80" font-family="monospace" font-size="13" fill="#818cf8">class="hero"</text>
      <text x="145" y="80" font-family="monospace" font-size="13" fill="#38bdf8">&gt;</text>
      
      <!-- Content inside div -->
      <rect x="35" y="100" width="120" height="40" rx="8" fill="#27272a" />
      <text x="95" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#f8fafc">UI 元素</text>
      
      <!-- SVG Code -->
      <text x="35" y="170" font-family="monospace" font-size="13" fill="#38bdf8">&lt;svg</text>
      <text x="71" y="170" font-family="monospace" font-size="13" fill="#818cf8">viewBox="..."</text>
      <text x="160" y="170" font-family="monospace" font-size="13" fill="#38bdf8">&gt;</text>
      
      <!-- Capture Selection Box (The motif) -->
      <rect x="25" y="90" width="140" height="96" rx="4" fill="#0ea5e9" fill-opacity="0.1" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="4,4" />
      <!-- Label -->
      <rect x="25" y="70" width="60" height="20" rx="4" fill="#0ea5e9" />
      <text x="55" y="84" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#ffffff">选中抓取</text>

      <text x="20" y="215" font-family="monospace" font-size="13" fill="#38bdf8">&lt;/div&gt;</text>
    </g>

    <!-- Connection Bridge -->
    <g transform="translate(200, 0)">
      <path d="M 0 138 C 30 138, 30 178, 60 178" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="4,4" />
      <circle cx="0" cy="138" r="3" fill="#0ea5e9" />
      <circle cx="60" cy="178" r="4" fill="#0ea5e9" />
    </g>

    <!-- Figma Panel -->
    <g transform="translate(260, 0)">
      <rect width="200" height="320" rx="12" fill="#18181b" stroke="#27272a" stroke-width="2" />
      
      <!-- Figma tabs -->
      <text x="20" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#f4f4f5">图层</text>
      <text x="60" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#71717a">资产</text>
      
      <line x1="0" y1="40" x2="200" y2="40" stroke="#27272a" stroke-width="2" />
      
      <!-- Figma Layer Tree -->
      <g transform="translate(20, 65)">
        <text x="0" y="10" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#71717a">#</text>
        <text x="18" y="10" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#f8fafc">Frame 1</text>
      </g>
      
      <g transform="translate(36, 95)">
        <!-- Highlighted layer matching the capture -->
        <rect x="-10" y="-12" width="160" height="24" rx="4" fill="#0ea5e9" fill-opacity="0.15" />
        <text x="0" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#0ea5e9">#</text>
        <text x="16" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#0ea5e9">div.hero</text>
      </g>

      <g transform="translate(52, 125)">
        <text x="0" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#71717a">T</text>
        <text x="16" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#d4d4d8">UI 元素</text>
      </g>

      <g transform="translate(52, 155)">
        <text x="0" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#71717a">❖</text>
        <text x="16" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#d4d4d8">svg (矢量)</text>
      </g>
      
    </g>

  </g>
</svg>
